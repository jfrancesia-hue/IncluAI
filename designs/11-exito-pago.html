<style>
  body { font-family: 'DM Sans', sans-serif; background-color: #f5f7fa; }
  .font-display { font-family: 'Outfit', sans-serif; }

  /* ---- Keyframes ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.6); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes checkDraw {
    from { stroke-dashoffset: 60; opacity: 0; }
    to   { stroke-dashoffset: 0; opacity: 1; }
  }
  @keyframes ringPulse {
    0%   { transform: scale(1);   opacity: 0.35; }
    60%  { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(80px)  rotate(720deg); opacity: 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  .animate-fade-up  { animation: fadeUp 0.6s ease-out forwards; }
  .animate-scale-in { animation: scaleIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  .animate-float    { animation: float 4s ease-in-out infinite; }

  .stagger-1 { animation-delay: 0.1s;  opacity: 0; }
  .stagger-2 { animation-delay: 0.3s;  opacity: 0; }
  .stagger-3 { animation-delay: 0.45s; opacity: 0; }
  .stagger-4 { animation-delay: 0.6s;  opacity: 0; }
  .stagger-5 { animation-delay: 0.75s; opacity: 0; }
  .stagger-6 { animation-delay: 0.9s;  opacity: 0; }

  /* Check stroke animation */
  .check-path {
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: checkDraw 0.5s ease-out 0.65s forwards;
    opacity: 0;
  }

  /* Pulsing ring */
  .ring-pulse {
    animation: ringPulse 1.4s ease-out 0.2s forwards;
  }
  .ring-pulse-2 {
    animation: ringPulse 1.4s ease-out 0.5s forwards;
  }

  /* Confetti pieces */
  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confettiFall 1.2s ease-out forwards;
  }

  /* Summary card glow */

    box-shadow: 0 4px 24px rgba(22,163,74,0.10), 0 1px 4px rgba(0,0,0,0.04);

</style>

<!-- ============================================================
     CONFETTI SCRIPT
     ============================================================ -->
<script>
(function() {
  const colors = ['#16a34a','#0d9448','#1e3a5f','#2a5a8f','#dcfce7','#bbf7d0','#86efac','#4ade80'];
  const shapes = ['rounded-sm','rounded-full'];
  const container = document.getElementById('confetti-container');
  const count = 28;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    const angle = (i / count) * 360;
    const radius = 48 + Math.random() * 56; // px from center
    const rad = angle * Math.PI / 180;
    const x = Math.cos(rad) * radius;
    const y = Math.sin(rad) * radius;
    const size = 5 + Math.random() * 7;
    const delay = 0.3 + Math.random() * 0.4;
    const duration = 0.9 + Math.random() * 0.6;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const rotation = Math.random() * 360;

    el.style.cssText = `
      position: absolute;
      width: ${size}px;
      height: ${size}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      background: ${color};
      left: ${x}px;
      top: ${y}px;
      transform-origin: center center;
      animation: confettiFall ${duration}s ease-out ${delay}s forwards;
      opacity: 0;
    `;

    // Override animation to fan outward
    el.style.animation = 'none';
    el.style.opacity = '0';
    container.appendChild(el);

    // Trigger after a small delay so animation fires fresh
    setTimeout(() => {
      el.style.transition = `transform ${duration}s cubic-bezier(0.22,1,0.36,1) ${delay}s, opacity ${duration * 0.6}s ease-out ${delay}s`;
      el.style.transform = `translate(${x * 1.5}px, ${y * 1.5 + 60}px) rotate(${rotation}deg)`;
      el.style.opacity = '0';
      // Pop in then fade
      setTimeout(() => {
        el.style.opacity = '1';
        el.style.transform = `translate(${x * 0.8}px, ${y * 0.8}px) rotate(${rotation * 0.3}deg)`;
        setTimeout(() => {
          el.style.transition += `, opacity 0.6s ease-out`;
          el.style.opacity = '0';
        }, (delay + duration * 0.5) * 1000);
      }, 50);
    }, 10);
  }
})();
</script>
